<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breath-Taking's Cut</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #fff;
    }

    header {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70');
      background-size: cover;
      background-position: center;
      padding: 80px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
    }

    header p {
      color: #ccc;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #25D366;
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .services, .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
    }

    footer {
      background: #000;
      padding: 20px;
      text-align: center;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Breath-Taking's Cut</h1>
  <p>Clean cuts. Sharp style.</p>
  <a class="btn" href="https://wa.me/2348104486235">Book Appointment</a>
</header>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Haircut – ₦3,000</div>
    <div class="card">Fade – ₦4,000</div>
    <div class="card">Home Service – ₦8,000</div>
  </div>
</section>

<section class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    <img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a">
  </div>
</section>

<section class="section">
  <h2>Find Us</h2>
  <p>No 48, Alhaji Otta Street, Olorunsogo Mushin Bus Stop</p>

  <iframe src="https://maps.google.com/maps?q=Mushin%20Lagos&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<footer>
  <p>📍 No 48, Alhaji Otta Street, Olorunsogo Mushin Bus Stop</p>
  <p>© 2026 Breath-Taking's Cut</p>
</footer>

</body>
</html>
